<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>charity: water | The Rippled Path</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="game-area">
        <h1>charity: water | The Rippled Path</h1>

        <div id="game-info"></div>
        <div id="fun-fact" aria-live="polite"></div>
        <div id="coord-readout"></div>

        <div
            id="map-field"
            role="button"
            aria-label="Interactive game map. Click to reveal tiles."
        ></div>

        <div id="last-action"></div>

        <div id="end-modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="end-modal-title">
            <div id="end-modal-card">
                <h2 id="end-modal-title"></h2>
                <p id="end-modal-message"></p>
                <div id="end-modal-buttons">
                    <button id="reset-level-btn" type="button">Reset Level</button>
                    <button id="next-level-btn" type="button">Next Level</button>
                    <button id="carryover-level-btn" class="hidden" type="button">Next Level (Use Leftover Drops)</button>
                </div>
                <div id="end-modal-links" class="hidden" aria-label="charity: water links">
                    <a id="charity-site-link" href="https://www.charitywater.org" target="_blank" rel="noopener noreferrer">Visit charity: water</a>
                    <a id="charity-donate-link" href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate to charity: water</a>
                </div>
            </div>
        </div>

        <div id="tutorial-modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="tutorial-modal-title">
            <div id="tutorial-modal-card">
                <h2 id="tutorial-modal-title"></h2>
                <p id="tutorial-modal-message"></p>
                <ol id="tutorial-modal-steps"></ol>
                <div id="tutorial-target-preview">
                    <img
                        id="tutorial-target-image"
                        src="img/town-center.png"
                        alt="Example of the town center target"
                    >
                    <p id="tutorial-target-fallback" class="hidden">
                        Add img/town-center.png to show the town center target preview here.
                    </p>
                </div>
                <button id="start-mission-btn" type="button">Start Mission</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
